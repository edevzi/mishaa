<!-- @dsCard group="Type" viewport="700x160" name="Mono — IBM Plex Mono (labels)" subtitle="Eyebrows, metadata, scores, kbd — uppercase + tracked" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 26px; display:flex; flex-direction:column; gap: 16px; }
  .row { display:flex; gap: 14px; align-items:center; flex-wrap: wrap; }
  .eb { font-family: var(--font-mono); font-size: 11px; letter-spacing:.12em; text-transform:uppercase; color: var(--text-muted); }
  .chip { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); border:1px solid var(--border); border-radius: var(--radius-xs); padding: 4px 8px; }
  .kbd { font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); background: var(--surface-card); border:1px solid var(--border); border-bottom-width:2px; border-radius: 6px; padding: 3px 8px; }
  .score { font-family: var(--font-mono); font-weight:600; font-size: 13px; color: var(--accent-text); }
</style>
</head>
<body>
<div class="row"><span class="eb">Continue reading</span><span class="eb">Trending now</span><span class="eb">For you</span></div>
<div class="row"><span class="chip">ch. 142 · page 8/24</span><span class="chip">ONGOING</span><span class="score">★ 8.9</span></div>
<div class="row"><span class="kbd">←</span><span class="kbd">→</span><span class="kbd">Space</span><span class="kbd">F</span><span class="kbd">Esc</span></div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x150" name="Ink — dark surfaces" subtitle="Warm plum-charcoal neutrals (dark mode is the hero)" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; }
  .scale { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { border-radius: var(--radius-md); height: 76px; border: 1px solid var(--border-subtle); }
  .lab { font-family: var(--font-mono); font-size: 9.5px; margin-top: 6px; color: var(--text-muted); line-height: 1.4; }
  .lab b { display: block; color: var(--text-secondary); font-weight: 500; }
</style>
</head>
<body>
<div class="scale">
  <div><div class="sw" style="background:var(--ink-990)"></div><div class="lab"><b>990</b>reader</div></div>
  <div><div class="sw" style="background:var(--ink-950)"></div><div class="lab"><b>950</b>app</div></div>
  <div><div class="sw" style="background:var(--ink-900)"></div><div class="lab"><b>900</b>base</div></div>
  <div><div class="sw" style="background:var(--ink-850)"></div><div class="lab"><b>850</b>raised</div></div>
  <div><div class="sw" style="background:var(--ink-800)"></div><div class="lab"><b>800</b>card</div></div>
  <div><div class="sw" style="background:var(--ink-750)"></div><div class="lab"><b>750</b>hover</div></div>
  <div><div class="sw" style="background:var(--ink-700)"></div><div class="lab"><b>700</b>border+</div></div>
  <div><div class="sw" style="background:var(--ink-650)"></div><div class="lab"><b>650</b>border</div></div>
</div>
</body>
</html>

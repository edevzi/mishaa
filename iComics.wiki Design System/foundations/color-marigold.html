<!-- @dsCard group="Colors" viewport="700x150" name="Marigold — signature accent" subtitle="The one warm signal: CTAs, focus, progress" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); height: 76px; display: flex; align-items: flex-end; padding: 8px;
        border: 1px solid var(--border-subtle); }
  .lab { font-family: var(--font-mono); font-size: 10px; margin-top: 7px; color: var(--text-muted); line-height: 1.4; }
  .lab b { display: block; color: var(--text-secondary); font-weight: 500; }
</style>
</head>
<body>
<div class="scale">
  <div><div class="sw" style="background:var(--marigold-200)"></div><div class="lab"><b>200</b>#FCD9A8</div></div>
  <div><div class="sw" style="background:var(--marigold-300)"></div><div class="lab"><b>300</b>#FBC685</div></div>
  <div><div class="sw" style="background:var(--marigold-400)"></div><div class="lab"><b>400</b>#F7AE5A</div></div>
  <div><div class="sw" style="background:var(--marigold-500);box-shadow:0 0 0 2px var(--accent)"></div><div class="lab"><b>500 ·core</b>#F2994A</div></div>
  <div><div class="sw" style="background:var(--marigold-600)"></div><div class="lab"><b>600</b>#E07F2E</div></div>
  <div><div class="sw" style="background:var(--marigold-700)"></div><div class="lab"><b>700</b>#B5611C</div></div>
  <div><div class="sw" style="background:var(--marigold-800)"></div><div class="lab"><b>800</b>#8A4A18</div></div>
</div>
</body>
</html>

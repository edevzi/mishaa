<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid — generous, editorial rhythm" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; display:flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
  .u { display:flex; flex-direction: column; align-items:center; gap: 8px; }
  .bar { background: var(--accent); border-radius: 3px; width: 100%; }
  .box { width: 30px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="u box"><div class="bar" style="height:var(--space-1)"></div><span class="lab">1·4</span></div>
  <div class="u box"><div class="bar" style="height:var(--space-2)"></div><span class="lab">2·8</span></div>
  <div class="u box"><div class="bar" style="height:var(--space-3)"></div><span class="lab">3·12</span></div>
  <div class="u box"><div class="bar" style="height:var(--space-4)"></div><span class="lab">4·16</span></div>
  <div class="u box"><div class="bar" style="height:var(--space-6)"></div><span class="lab">6·24</span></div>
  <div class="u box"><div class="bar" style="height:var(--space-8)"></div><span class="lab">8·32</span></div>
  <div class="u box"><div class="bar" style="height:var(--space-12)"></div><span class="lab">12·48</span></div>
  <div class="u box"><div class="bar" style="height:var(--space-16)"></div><span class="lab">16·64</span></div>
</body>
</html>
